<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notthatcooked 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#07060c;--surface:#0f0e1a;--card:#1a1828;--card-h:#221f35;--border:rgba(255,255,255,0.08);
  --text:#f0f0ff;--muted:#8a8fa3;

  --xp:#6366f1;--xp2:#a855f7;--xp-g:rgba(99,102,241,.35);

  --str:#fbbf24;--str-g:rgba(251,191,36,.35);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:900px;height:900px;background:radial-gradient(ellipse,rgba(255,85,0,.07) 0%,transparent 65%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 4px);pointer-events:none;z-index:99999}
#app{position:relative;z-index:1;min-height:100vh}
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(7,6,12,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:58px;display:flex;align-items:center;gap:14px}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--fire);cursor:pointer;letter-spacing:.05em;text-shadow:0 0 18px var(--fire-g);flex-shrink:0}
.h-xp{flex:1;min-width:0}.h-lrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.h-lvl{font-size:10px;font-weight:600;color:var(--xp);background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);padding:2px 8px;border-radius:20px;white-space:nowrap}
.h-xplbl{font-size:10px;color:var(--muted);white-space:nowrap}.xp-out{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.xp-in{height:100%;background:linear-gradient(90deg,var(--xp),var(--xp2));border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 8px var(--xp-g)}
.h-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--border);background:var(--card-h);display:flex;align-items:center;justify-content:center;font-size:16px}
.str-badge{font-size:12px;font-weight:600;color:var(--str);background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;text-shadow:0 0 10px var(--str-g)}
#main{padding-top:58px;min-height:100vh}.screen{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);padding:40px 20px;text-align:center}
.h-fire{font-size:56px;animation:bobble 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,85,0,.5));margin-bottom:8px}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(54px,12vw,110px);line-height:.95;background:linear-gradient(135deg,#ff5500,#ff2e60 50%,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,85,0,.4));margin-bottom:8px}
.h-sub{font-size:14px;color:var(--muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.h-stats,.r-grid,.sg{display:grid;grid-template-columns:repeat(4,minmax(92px,1fr));gap:12px;margin-bottom:28px;width:100%;max-width:680px}
.h-stat,.r-card,.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-align:center}
.h-sn,.r-cn,.scn{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.05em;line-height:1}
.h-sl,.r-cl,.scl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.cook-meter{width:100%;max-width:420px;margin:0 auto 28px}.cm-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;font-weight:600}
.cm-out{height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden}.cm-in{height:100%;border-radius:5px;transition:width 1s ease,background 1s ease}
.h-acts{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:330px}.h-row{display:flex;gap:10px;width:100%}.h-row .btn{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;outline:none;text-decoration:none;line-height:1}
.btn-fire{background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;box-shadow:0 4px 20px var(--fire-g)}.btn-fire:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,85,0,.45)}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.btn-lg{padding:15px 38px;font-size:16px;border-radius:16px}.btn-sm{padding:8px 12px;font-size:12px;border-radius:8px}.btn-full{width:100%}
.page{max-width:920px;margin:0 auto;padding:36px 20px}.pg-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:.05em;margin-bottom:6px}.pg-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.topic-grid,.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;margin-bottom:20px}
.t-card,.player-card,.bg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:all .22s;position:relative;overflow:hidden}
.t-card{cursor:pointer}.t-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,var(--fire));opacity:.85}
.t-card:hover,.player-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);background:var(--card-h);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.t-hdr,.mi-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.t-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px}.t-desc{font-size:11px;color:var(--muted);margin-bottom:12px}
.t-stats{display:flex;gap:10px;font-size:11px;color:var(--muted)}.boss-card{grid-column:1/-1;background:linear-gradient(135deg,rgba(255,85,0,.13),rgba(255,46,96,.13));border:1px solid rgba(255,85,0,.3);border-radius:var(--r);padding:20px;cursor:pointer;text-align:center;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.boss-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--fire);letter-spacing:.05em}.boss-desc{font-size:13px;color:var(--muted)}
.quiz{max-width:660px;margin:0 auto;padding:20px 18px}.q-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.q-tlbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}.q-cnt{font-size:11px;color:var(--muted)}
.q-prog,.timer-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:16px;overflow:hidden}.q-pfill,.timer-fill{height:100%;background:linear-gradient(90deg,var(--fire),var(--fire2));border-radius:2px;transition:width .5s ease}
.q-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:28px 24px;margin-bottom:18px;min-height:110px;display:flex;align-items:center;justify-content:center;transition:border-color .25s,box-shadow .25s}
.q-card.ok{border-color:var(--ok);box-shadow:0 0 28px var(--ok-g)}.q-card.err{border-color:var(--err);box-shadow:0 0 28px var(--err-g);animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.q-text{font-size:17px;font-weight:500;line-height:1.55;text-align:center;color:var(--text)}.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 14px;cursor:pointer;text-align:left;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--text);transition:all .18s;display:flex;align-items:center;gap:9px;min-height:52px;line-height:1.3}
.opt:hover:not(:disabled){background:var(--card-h);border-color:rgba(255,255,255,.18);transform:translateY(-2px)}.opt:disabled{cursor:default}.opt.hit{background:rgba(34,197,94,.15);border-color:var(--ok);color:var(--ok);box-shadow:0 0 14px var(--ok-g)}.opt.miss{background:rgba(239,68,68,.15);border-color:var(--err);color:var(--err);box-shadow:0 0 14px var(--err-g)}.opt.show{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.4);color:var(--ok)}
.okey{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.fb-box{padding:14px 16px;border-radius:var(--r);margin-bottom:14px;font-size:13px;line-height:1.5;display:none}.fb-box.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;display:block}.fb-box.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.results{max-width:660px;margin:0 auto;padding:36px 20px}.r-big{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:.04em;line-height:1;background:linear-gradient(135deg,var(--str),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px}.r-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px}.r-acts{display:flex;flex-direction:column;gap:10px}
.mlist{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}.mi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px}.mi-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px}.mi-pct{font-size:12px;font-weight:700}.mb-out{height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}.mb-in{height:100%;border-radius:4px;transition:width .9s ease}
.bg-card{text-align:center}.bg-card.earned{border-color:var(--str);box-shadow:0 0 18px rgba(251,191,36,.18)}.bg-card.locked{opacity:.35}.bg-em{font-size:32px;margin-bottom:9px}.bg-name{font-size:12px;font-weight:700;margin-bottom:4px}.bg-desc{font-size:10px;color:var(--muted);line-height:1.4}
.form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:22px}.field{width:100%;margin-bottom:10px;padding:13px;border-radius:var(--r);border:1px solid var(--border);background:#11101d;color:var(--text);font-family:inherit;font-size:14px}.file{width:100%;margin-bottom:12px;color:var(--muted)}
.sec-title{font-size:17px;font-weight:700;margin-bottom:14px}.divider{height:1px;background:var(--border);margin:22px 0}.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:20px;transition:color .2s;background:none;border:none;font-family:'Outfit',sans-serif}.back-btn:hover{color:var(--text)}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}.xpf{position:fixed;font-family:'Bebas Neue',sans-serif;font-size:22px;font-weight:700;color:var(--str);text-shadow:0 0 15px var(--str-g);pointer-events:none;z-index:9999;animation:xpfa 1.4s ease-out forwards}
@keyframes xpfa{0%{opacity:1;transform:translateY(0) scale(1)}20%{transform:translateY(-18px) scale(1.25)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;font-size:13px;font-weight:500;z-index:9997;display:flex;align-items:center;gap:9px;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:fadeUp .3s ease,toastOut .3s ease 2.7s forwards;max-width:300px}
@keyframes toastOut{to{opacity:0;transform:translateY(8px)}}.combo{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:56px;text-align:center;pointer-events:none;z-index:9998;letter-spacing:.06em;animation:comboPop 1.3s ease-out forwards}
@keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}55%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(.9)}}.lup{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:fadeUp .3s ease;padding:40px}.lup-title{font-family:'Bebas Neue',sans-serif;font-size:70px;background:linear-gradient(135deg,var(--str),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.05em}.lup-name{font-size:20px;font-weight:600;margin:6px 0 8px}.lup-desc{font-size:14px;color:var(--muted);margin-bottom:28px}
.adventure-top{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.hero-panel,.quest-panel{background:linear-gradient(135deg,rgba(255,85,0,.12),rgba(99,102,241,.12));border:1px solid var(--border);border-radius:var(--r);padding:18px;min-height:150px}.hero-creature{display:flex;align-items:center;gap:14px}.big-sprite{width:86px;height:86px;border-radius:18px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:54px;box-shadow:inset 0 0 0 1px var(--border),0 14px 36px rgba(0,0,0,.25)}.hero-name{font-size:18px;font-weight:800;margin-bottom:5px}.hero-meta{color:var(--muted);font-size:12px;line-height:1.5}.coin-pill{display:inline-flex;align-items:center;gap:6px;color:var(--str);border:1px solid rgba(251,191,36,.28);background:rgba(251,191,36,.1);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;margin-top:10px}.world-map{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.zone{position:relative;min-height:168px;border-radius:18px;padding:18px;background:linear-gradient(145deg,var(--z1),var(--z2));border:1px solid rgba(255,255,255,.12);overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s,border-color .22s}.zone::before{content:'';position:absolute;inset:-50%;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.18),transparent 28%);opacity:.6}.zone:hover{transform:translateY(-4px);box-shadow:0 16px 42px rgba(0,0,0,.32);border-color:rgba(255,255,255,.24)}.zone-icon{position:relative;font-size:42px;margin-bottom:12px}.zone-title{position:relative;font-size:15px;font-weight:800;margin-bottom:6px}.zone-copy{position:relative;font-size:12px;color:rgba(255,255,255,.75);line-height:1.4}.zone-progress{position:relative;margin-top:14px;height:7px;background:rgba(0,0,0,.28);border-radius:999px;overflow:hidden}.zone-fill{height:100%;background:rgba(255,255,255,.78);border-radius:999px}.starter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.starter{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .22s}.starter:hover{transform:translateY(-3px);border-color:var(--fire);box-shadow:0 12px 28px var(--fire-g)}.starter .big-sprite{margin:0 auto 12px}.battle-arena{max-width:900px;margin:0 auto;padding:24px 18px}.battle-stage{position:relative;min-height:320px;border-radius:22px;padding:22px;background:linear-gradient(180deg,#17162a,#0f0e1a 52%,#151321);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}.battle-stage::before{content:'';position:absolute;left:8%;right:8%;bottom:44px;height:86px;border-radius:50%;background:radial-gradient(ellipse,rgba(34,197,94,.18),transparent 70%)}.fighter{position:absolute;display:flex;flex-direction:column;gap:8px}.fighter.enemy{top:28px;right:34px;align-items:flex-end}.fighter.player{left:34px;bottom:24px}.sprite{width:112px;height:112px;border-radius:24px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:70px;box-shadow:inset 0 0 0 1px var(--border),0 20px 45px rgba(0,0,0,.32);animation:idle 2.6s ease-in-out infinite}.enemy .sprite{animation-delay:.5s}.sprite.hit{animation:hitFlash .36s ease}.sprite.attack{animation:attackLunge .42s ease}@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes hitFlash{0%,100%{filter:none;transform:translateX(0)}40%{filter:brightness(1.8);transform:translateX(-10px)}}@keyframes attackLunge{0%,100%{transform:translateX(0)}50%{transform:translateX(16px) scale(1.06)}}.hp-card{min-width:210px;background:rgba(7,6,12,.78);border:1px solid var(--border);border-radius:12px;padding:10px 12px;backdrop-filter:blur(12px)}.hp-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:800;margin-bottom:6px}.hp-bar{height:9px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden}.hp-fill{height:100%; function worldTile(x,y){
  if(y===0||x===0||x===WORLD_W-1||y===WORLD_H-1)return 'wall';
  const water=(x>=22&&x<=28&&y>=14&&y<=16)||(x>=1&&x<=3&&y>=9&&y<=12);
  const nearWater=(x>=21&&x<=29&&y>=12&&y<=17)||(x>=1&&x<=5&&y>=8&&y<=13);
  const path=(x>=13&&x<=17)||(y>=10&&y<=12)||(x>=3&&x<=6&&y>=3&&y<=5)||(x===5&&y>=3&&y<=12)||(x>=24&&x<=27&&y>=17&&y<=20)||(x===24&&y>=12&&y<=16)||(x===25&&y>=5&&y<=12)||(y===18&&x>=8&&x<=17);
  const floor=(x>=3&&x<=5&&y>=2&&y<=4)||(x>=14&&x<=16&&y>=2&&y<=4)||(x>=7&&x<=9&&y>=17&&y<=19)||(x>=26&&x<=28&&y>=18&&y<=20);
  if(water)return 'water';
  if(nearWater&&!path&&!floor)return hashTile(x,y)%3===0?'shore':'sand';
  if(path)return hashTile(x,y)%4===0?'path path2':'path';
  if(floor)return 'floor';
  const h=hashTile(x,y);
  if(h%11===0)return 'flowers';
  if(h%5===0)return 'grass grass2';
  return 'grass';
}

function worldTile(x,y){
  if(y===0||x===0||x===WORLD_W-1||y===WORLD_H-1)return 'wall';
  const water=(x>=28&&y>=13&&y<=24)||(x>=29&&y>=10&&y<=12)||(x>=2&&x<=5&&y>=12&&y<=14);
  const nearWater=(x>=25&&y>=10&&y<=24)||(x>=1&&x<=7&&y>=10&&y<=15);
  const path=(x>=17&&x<=18&&y>=3&&y<=23)||(y>=13&&y<=14&&x>=5&&x<=31)||(x>=6&&x<=7&&y>=6&&y<=14)||(x>=24&&x<=25&&y>=18&&y<=23)||(y>=21&&y<=22&&x>=10&&x<=31)||(y>=7&&y<=8&&x>=18&&x<=30);
  const floor=(x>=12&&x<=15&&y>=5&&y<=8)||(x>=20&&x<=23&&y>=5&&y<=8)||(x>=5&&x<=9&&y>=15&&y<=18)||(x>=31&&x<=33&&y>=19&&y<=22);
  if(water)return 'water';
  if(nearWater&&!path&&!floor)return hashTile(x,y)%3===0?'shore':'sand';
  if(path)return hashTile(x,y)%4===0?'path path2':'path';
  if(floor)return 'floor';
  const h=hashTile(x,y);
  if(h%11===0)return 'flowers';
  if(h%5===0)return 'grass grass2';
  return 'grass';
}
function tilePx(){
  const cam=document.querySelector('.world-camera');
  if(!cam)return GAME.tileSize;
  const raw=getComputedStyle(cam).getPropertyValue('--tile').trim();
  return Number(raw.replace('px',''))||GAME.tileSize;
}
function viewTiles(){
  const cam=document.querySelector('.world-camera');
  if(!cam)return {w:WORLD_VIEW_W,h:WORLD_VIEW_H};
  const style=getComputedStyle(cam);
  return {
    w:Number(style.getPropertyValue('--vieww').trim())||WORLD_VIEW_W,
    h:Number(style.getPropertyValue('--viewh').trim())||WORLD_VIEW_H
  };
}
function getCamera(){
  const view=viewTiles();
  return {
    x:Math.max(0,Math.min(WORLD_W-view.w,worldPlayer.x-(view.w/2))),
    y:Math.max(0,Math.min(WORLD_H-view.h,worldPlayer.y-(view.h/2)))
  };
}
function isBlocked(x,y){
  if(x<0||y<0||x>=WORLD_W||y>=WORLD_H)return true;
  const t=worldTile(Math.floor(x),Math.floor(y));
  return t==='wall'||t==='water';
}
function isBlockedFree(x,y){
  const r=FREE_MOVE.radius;
  const samples=[[x-r,y-r],[x+r,y-r],[x-r,y+r],[x+r,y+r],[x,y-r],[x,y+r],[x-r,y],[x+r,y]];
  if(samples.some(([sx,sy])=>isBlocked(sx,sy)))return true;
  if(WORLD_DECOS.some(d=>{
    if(!['tree','small-tree','house','tower','fence'].includes(d.type))return false;
    const w=d.type==='house'||d.type==='tower'?1.35:d.type==='fence'?1.15:0.75;
    const h=d.type==='house'||d.type==='tower'?1.15:d.type==='fence'?0.45:0.75;
    return Math.abs(x-d.x)<w&&Math.abs(y-d.y)<h;
  }))return true;
  return WORLD_NPCS.some(n=>Math.hypot(n.x-x,n.y-y)<.68);
}
function moveWorld(dx,dy){
  const nx=worldPlayer.x+dx,ny=worldPlayer.y+dy;

  if(BS.answered)return;

  const c=getClass(),weapon=getWeapon(),q=BS.questions[BS.idx%BS.questions.length],correct=chosen===q.ans;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('hit');else if(i===chosen&&!correct)b.classList.add('miss');});

    S.streak++;
    S.totalCorrect++;
    S.totalQ++;
    S.maxStreak=Math.max(S.maxStreak,S.streak);
    const topicId=q._topic||BS.topicId;
    if(topicId&&S.topicStats[topicId])S.topicStats[topicId].correct=Math.min(S.topicStats[topicId].total,S.topicStats[topicId].correct+1);
    let damage=24+Math.floor(S.streak/3)*5+(q.diff||1)*2+weapon.damage;
    if(c.id==='swordsman'&&S.streak>=3)damage+=8;
    const quick=(Date.now()-(BS.questionStartTime||Date.now()))<4000;
    if(c.id==='archer'&&quick)damage+=10;
    if(c.id==='mage'&&BS.specialCharge%4===0)BS.playerHP=Math.min(BS.maxPlayerHP,BS.playerHP+10);
    const crit=Math.random()<weapon.crit;
    if(crit)damage=Math.round(damage*1.5);
    BS.enemyHP=Math.max(0,BS.enemyHP-damage);
    addXP(CFG.XP_BASE+Math.floor(S.streak/5)*CFG.XP_STREAK,ev?ev.clientX:window.innerWidth/2,ev?ev.clientY:240);
    const playerSprite=byId('player-sprite');
    if(playerSprite)playerSprite.innerHTML=playerBattleSprite(true);
    byId('enemy-sprite')?.classList.add('hit');
    BS.log=`${c.name} used ${weapon.name} with ${topicAttackName(topicId)} for ${damage} damage${crit?' (CRIT)':''}!`;
    fb.className='fb-box ok';
    fb.textContent=q.exp;
    if(S.streak>0&&S.streak%5===0)showCombo(S.streak);
    checkBadges({speedster:false,topicComplete:isTopicComplete(topicId)});
  }else{
    BS.wrong++;
    S.streak=0;
    S.totalQ++;
    const topicId=q._topic||BS.topicId;
    if(topicId&&S.topicStats[topicId])S.topicStats[topicId].attempted=(S.topicStats[topicId].attempted||0)+1;
    const hit=16+Math.floor(BS.idx/3)*3+(q.diff||1)*3;
    BS.playerHP=Math.max(0,BS.playerHP-hit);
    const enemyEl=byId('enemy-sprite');
    if(enemyEl)enemyEl.innerHTML=enemySprite(BS.enemy,'battle',true);
    byId('player-sprite')?.classList.add('hit');
    BS.log=`${BS.enemy.name} countered for ${hit} damage.`;
    fb.className='fb-box err';
    fb.textContent='❌ '+q.exp;
    updateHeader();
  }
  saveState();
  byId('battle-next').style.display='block';
  if(BS.enemyHP<=0||BS.playerHP<=0)setTimeout(()=>{BS.enemyHP<=0?showBattleWin():showBattleLose();},900);
}
function nextBattleRound(){
  BS.idx++;
  renderBattle();
}
function topicAttackName(topicId){
  const names={pt:'Preterite Slash',perf:'Perfect Pulse',ac:'Accent Beam',fi:'Oracle Call',pp:'Path Strike',se:'Mirror Break',sub:'Subjunctive Spiral',pps:'Perfect Storm',boss:'Final Review Burst'};
  return names[topicId]||'Grammar Strike';
}
function classAttackClass(c){
  if(c.id==='archer')return 'soldier-archer';
  if(c.id==='mage')return 'soldier-mage';
  return 'soldier-sword';
}
function useSpecialAttack(){
  if(!BS.specialReady||BS.answered)return;
  const c=getClass(),weapon=getWeapon();
  BS.answered=true;
  BS.specialReady=false;
  BS.specialCharge=0;
  let damage=42+S.level*2+weapon.damage;
  if(c.id==='swordsman')damage+=18;
  if(c.id==='archer')damage+=12;
  if(c.id==='mage'){damage+=8;BS.playerHP=Math.min(BS.maxPlayerHP,BS.playerHP+24);}
  BS.enemyHP=Math.max(0,BS.enemyHP-damage);
  const playerSprite=byId('player-sprite');
  if(playerSprite)playerSprite.innerHTML=playerBattleSprite(true);
  byId('enemy-sprite')?.classList.add('hit');
  BS.log=`${c.special}! ${c.name} used ${weapon.name} for ${damage} bonus damage${c.id==='mage'?' and restored HP':''}.`;
  const fb=byId('fb-box');
  fb.className='fb-box ok';
  fb.textContent=`${c.special}: ${c.desc}`;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  byId('battle-next').style.display='block';
  saveState();
  if(BS.enemyHP<=0)setTimeout(showBattleWin,700);
}
async function showBattleWin(){
  const c=getClass();
  let coins=BS.enemy.reward+Math.max(0,BS.correct-BS.wrong)*4;
  if(c.id==='archer')coins+=8;
  if(c.id==='mage')BS.playerHP=Math.min(BS.maxPlayerHP,BS.playerHP+18);
  S.coins=(S.coins||0)+coins;
  S.battleWins=(S.battleWins||0)+1;
  if(BS.topicId==='boss'){S.boss.beaten=true;checkBadges({boss:true});}
  const unlocked=refreshWeaponUnlocks(true);
  await saveState();
  setMain(`
    <div class="page">
      <div class="reward-box">
        <div class="reward-sprite" style="display:flex;justify-content:center">${playerBattleSprite(false)}</div>
        <div class="reward-title">Victory!</div>
        <div class="r-sub">${BS.enemy.name} was defeated in ${BS.correct+BS.wrong} rounds.${unlocked.length?` New weapon: ${unlocked.join(', ')}.`:''}</div>
        <div class="r-grid">
          <div class="r-card"><div class="r-cn" style="color:var(--ok)">${BS.correct}</div><div class="r-cl">Correct</div></div>
          <div class="r-card"><div class="r-cn" style="color:var(--err)">${BS.wrong}</div><div class="r-cl">Wrong</div></div>
          <div class="r-card"><div class="r-cn" style="color:var(--str)">${coins}</div><div class="r-cl">Coins</div></div>
          <div class="r-card"><div class="r-cn" style="color:var(--xp)">${S.level}</div><div class="r-cl">Level</div></div>
        </div>
        <div class="r-acts">
          <button class="btn btn-fire btn-full" onclick="showWorld()">Back to Map</button>
          <button class="btn btn-ghost btn-full" onclick="showWeapons()">Weapons</button>
          <button class="btn btn-ghost btn-full" onclick="startBattle('${BS.topicId}')">Rematch</button>
          <button class="btn btn-ghost btn-full" onclick="showLeaderboard()">Leaderboard</button>
        </div>
      </div>
    </div>`);
}
function showBattleLose(){
  setMain(`
    <div class="page">
      <div class="reward-box">
        <div class="reward-sprite" style="display:flex;justify-content:center">${enemySprite(BS.enemy,'battle')}</div>
        <div class="reward-title" style="background:linear-gradient(135deg,var(--err),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Defeated</div>
        <div class="r-sub">${BS.enemy.name} won this round. Review and try again.</div>
        <div class="r-acts">
          <button class="btn btn-fire btn-full" onclick="startBattle('${BS.topicId}')">Try Again</button>
          <button class="btn btn-ghost btn-full" onclick="showWorld()">Back to Map</button>
        </div>
      </div>
    </div>`);
}
function renderQuestion(){
  if(QS.idx>=QS.questions.length){showResults();return;}
  const q=QS.questions[QS.idx],total=QS.questions.length,pct=Math.round((QS.idx/total)*100),topic=TOPICS.find(t=>t.id===(q._topic||QS.topicId));
  QS.answered=false;QS.questionStartTime=Date.now();
  const opts=q.opts.map((o,i)=>`<button class="opt" id="opt-${i}" onclick="answerQ(${i},event)"><div class="okey">${String.fromCharCode(65+i)}</div>${o}</button>`).join('');
  const timerHtml=QS.timed?`<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;background:var(--ok)"></div></div>`:'';
  const livesHtml=QS.lives!==null?`<div style="font-size:18px;margin-bottom:12px"><span style="font-size:11px;color:var(--muted);margin-right:6px">Lives:</span>${Array.from({length:CFG.BOSS_LIVES},(_,i)=>i<QS.lives?'❤️':'🖤').join('')}</div>`:'';
  setMain(`<div class="quiz"><div class="q-hdr"><span class="q-tlbl" style="color:${topic?.color||'var(--fire)'}">${topic?.name||'Mixed'}</span><span class="q-cnt">${QS.idx+1} / ${total}</span></div><div class="q-prog"><div class="q-pfill" style="width:${pct}%"></div></div>${timerHtml}${livesHtml}<div class="q-card" id="q-card"><div class="q-text">${q.q}</div></div><div class="opts">${opts}</div><div class="fb-box" id="fb-box"></div><button class="btn btn-fire btn-full" id="q-next" style="display:none" onclick="nextQ()">Next →</button></div>`);
  if(QS.timed)startTimer();
}
function startTimer(){
  clearInterval(timerInterval);
  const duration=18000,start=Date.now(),fill=byId('timer-fill');
  timerInterval=setInterval(()=>{
    if(QS.answered){clearInterval(timerInterval);return;}
    const elapsed=Date.now()-start,pct=Math.max(0,100-(elapsed/duration)*100);
    if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'var(--ok)':pct>25?'var(--str)':'var(--err)';}
    if(elapsed>=duration&&!QS.answered){clearInterval(timerInterval);autoTimeOut();}
  },50);
}
function autoTimeOut(){
  QS.answered=true;
  const q=QS.questions[QS.idx];
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('show');});
  byId('q-card').classList.add('err');
  const fb=byId('fb-box');fb.className='fb-box err';fb.textContent="⏰ Time's up! "+q.exp;
  handleWrong();byId('q-next').style.display='block';
}
function answerQ(chosen,ev){
  if(QS.answered)return;
  QS.answered=true;clearInterval(timerInterval);
  const q=QS.questions[QS.idx],correct=chosen===q.ans,elapsed=(Date.now()-QS.questionStartTime)/1000;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('hit');else if(i===chosen&&!correct)b.classList.add('miss');});
  const card=byId('q-card'),fb=byId('fb-box');
  if(correct){card.classList.add('ok');fb.className='fb-box ok';fb.textContent=q.exp;handleCorrect(ev,elapsed<3);}
  else{card.classList.add('err');fb.className='fb-box err';fb.textContent='❌ '+q.exp;handleWrong();}
  byId('q-next').style.display='block';
}
function handleCorrect(ev,speedster){
  QS.correct++;S.streak++;S.totalCorrect++;S.totalQ++;S.maxStreak=Math.max(S.maxStreak,S.streak);
  const q=QS.questions[QS.idx],topicId=q._topic||QS.topicId;
  if(topicId&&S.topicStats[topicId])S.topicStats[topicId].correct=Math.min(S.topicStats[topicId].total,S.topicStats[topicId].correct+1);
  const xpGain=CFG.XP_BASE+Math.floor(S.streak/5)*CFG.XP_STREAK;
  addXP(xpGain,ev?ev.clientX:window.innerWidth/2,ev?ev.clientY:200);
  if(S.streak>0&&S.streak%5===0)showCombo(S.streak);
  checkBadges({speedster,topicComplete:isTopicComplete(topicId)});saveState();
}
function handleWrong(){
  S.streak=0;S.totalQ++;
  const q=QS.questions[QS.idx],topicId=q._topic||QS.topicId;
  if(topicId&&S.topicStats[topicId])S.topicStats[topicId].attempted=(S.topicStats[topicId].attempted||0)+1;
  if(QS.boss&&QS.lives!==null){QS.lives--;if(QS.lives<=0){setTimeout(showBossFail,600);}}
  updateHeader();saveState();
}
function isTopicComplete(topicId){return topicId&&S.topicStats[topicId]&&S.topicStats[topicId].correct>=S.topicStats[topicId].total;}
function nextQ(){QS.idx++;if(QS.boss&&QS.lives!==null&&QS.lives<=0){showBossFail();return;}renderQuestion();}
function showBossFail(){setMain(`<div class="results"><div class="r-big" style="background:linear-gradient(135deg,var(--err),#ff5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">GAME<br>OVER</div><div class="r-sub">The boss defeated you. Train harder!</div><div class="r-acts"><button class="btn btn-fire btn-full" onclick="startBoss()">🔄 Try Again</button><button class="btn btn-ghost btn-full" onclick="showTopics()">📚 Back to Topics</button></div></div>`);}
function showResults(){
  const total=QS.questions.length,pct=Math.round((QS.correct/total)*100),time=Math.round((Date.now()-QS.startTime)/1000);
  if(QS.boss&&QS.lives>0){S.boss.beaten=true;checkBadges({boss:true});saveState();}
  if(pct===100)checkBadges({perfect:true});
  const msg=pct>=90?'🏆 PERFECT!':pct>=75?'🔥 On Fire!':pct>=60?'💪 Getting There':pct>=40?'😅 Keep Grinding':'💀 You Got Cooked';
  setMain(`<div class="results"><div class="r-big">${pct}%</div><div class="r-sub">${msg} • ${Math.floor(time/60)}m ${time%60}s</div><div class="r-grid"><div class="r-card"><div class="r-cn" style="color:var(--ok)">${QS.correct}</div><div class="r-cl">Correct</div></div><div class="r-card"><div class="r-cn" style="color:var(--err)">${total-QS.correct}</div><div class="r-cl">Wrong</div></div><div class="r-card"><div class="r-cn" style="color:var(--str)">${S.totalXP}</div><div class="r-cl">Total XP</div></div><div class="r-card"><div class="r-cn" style="color:var(--xp)">${S.level}</div><div class="r-cl">Level</div></div></div><div class="r-acts"><button class="btn btn-fire btn-full" onclick="showTopics()">📚 More Topics</button><button class="btn btn-ghost btn-full" onclick="showLeaderboard()">🏅 Leaderboard</button><button class="btn btn-ghost btn-full" onclick="showHome()">🏠 Home</button></div></div>`);
}
function showStats(){
  const acc=S.totalQ?Math.round((S.totalCorrect/S.totalQ)*100):0;
  const topicBars=TOPICS.map(t=>{const st=S.topicStats[t.id],pct=Math.round((st.correct/st.total)*100);return `<div class="mi"><div class="mi-hdr"><div class="mi-name"><span>${t.emoji}</span>${t.name}</div><div class="mi-pct" style="color:${t.color}">${pct}%</div></div><div class="mb-out"><div class="mb-in" style="width:${pct}%;background:${t.color}"></div></div></div>`;}).join('');
  setMain(`<div class="page"><button class="back-btn" onclick="showHome()">← Back</button><div class="pg-title">Your Stats</div><div class="sg"><div class="sc"><div class="scn" style="color:var(--fire)">${S.level}</div><div class="scl">Level</div></div><div class="sc"><div class="scn" style="color:var(--str)">${S.totalXP}</div><div class="scl">Total XP</div></div><div class="sc"><div class="scn" style="color:var(--xp)">${acc}%</div><div class="scl">Accuracy</div></div><div class="sc"><div class="scn" style="color:var(--ok)">${S.totalQ}</div><div class="scl">Questions</div></div></div><div class="sec-title">Topic Progress</div><div class="mlist">${topicBars}</div></div>`);
}
function showBadges(){
  const html=BADGE_DEFS.map(b=>{const earned=S.badges.includes(b.id);return `<div class="bg-card ${earned?'earned':'locked'}"><div class="bg-em">${earned?b.emoji:'🔒'}</div><div class="bg-name">${b.name}</div><div class="bg-desc">${b.desc}</div></div>`;}).join('');
  setMain(`<div class="page"><button class="back-btn" onclick="showHome()">← Back</button><div class="pg-title">Badges</div><div class="pg-sub">${S.badges.length} / ${BADGE_DEFS.length} unlocked</div><div class="bg-grid">${html}</div></div>`);
}
function resetActivePlayer(){
  if(!confirm('Reset this player only?'))return;
  S=defaultState();normalizeState();saveState();showToast('Player progress reset','🔥');showHome();
}
function floatXP(text,x,y){const el=document.createElement('div');el.className='xpf';el.textContent=text;el.style.left=(x||window.innerWidth/2)+'px';el.style.top=(y||200)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1500);}
function showCombo(n){const msg=n>=10?'⚡ UNSTOPPABLE!':'🔥 ON FIRE!';const el=document.createElement('div');el.className='combo';el.textContent=msg;el.style.color=n>=10?'#a855f7':'#ff5500';document.body.appendChild(el);setTimeout(()=>el.remove(),1400);}
function showLevelUp(lvl){const el=document.createElement('div');el.className='lup';el.innerHTML=`<div style="font-size:64px;margin-bottom:12px">🎉</div><div class="lup-title">LEVEL ${lvl}!</div><div class="lup-name">${getLevelTitle(lvl)}</div><div class="lup-desc">Keep grinding — you've got this!</div><button class="btn btn-fire btn-lg" onclick="this.closest('.lup').remove()">Let's GO! 🔥</button>`;document.body.appendChild(el);}
function showToast(msg,emoji=''){const old=document.querySelector('.toast');if(old)old.remove();const el=document.createElement('div');el.className='toast';el.innerHTML=`${emoji?`<span>${emoji}</span>`:''}${msg}`;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function byId(id){return document.getElementById(id);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function setPadKey(dir,on){
  const map={up:'w',down:'s',left:'a',right:'d'};
  if(map[dir])FREE_MOVE.keys[map[dir]]=on;
}
function movementIntent(){
  const k=FREE_MOVE.keys;
  let dx=0,dy=0;
  if(k.a||k.arrowleft)dx-=1;
  if(k.d||k.arrowright)dx+=1;
  if(k.w||k.arrowup)dy-=1;
  if(k.s||k.arrowdown)dy+=1;
  const len=Math.hypot(dx,dy);
  return len?{dx:dx/len,dy:dy/len}:{dx:0,dy:0};
}
function worldTick(ts){
  if(!FREE_MOVE.last)FREE_MOVE.last=ts;
  const dt=Math.min(.05,(ts-FREE_MOVE.last)/1000);
  FREE_MOVE.last=ts;
  if(byId('tile-map')){
    const {dx,dy}=movementIntent();
    const moving=dx||dy;
    FREE_MOVE.walking=!!moving;
    if(moving){
      const step=FREE_MOVE.speed*dt;
      const nx=worldPlayer.x+dx*step;
      const ny=worldPlayer.y+dy*step;
      if(!isBlockedFree(nx,worldPlayer.y))worldPlayer.x=nx;
      if(!isBlockedFree(worldPlayer.x,ny))worldPlayer.y=ny;
      const near=getNearbyNpc();
      worldMsg=near?`${near.label}: Press E to battle ${ENEMIES[near.id].name}.`:'Explore the academy and find grammar trainers.';
      S.worldPos={...worldPlayer};
    }
    updateWorldView();
  }
  FREE_MOVE.raf=requestAnimationFrame(worldTick);
}
function handleWorldKey(e){
  const tag=(document.activeElement&&document.activeElement.tagName)||'';
  if(['INPUT','TEXTAREA','SELECT'].includes(tag))return;
  const key=e.key.toLowerCase();
  if(!byId('tile-map'))return;
  if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(key)){
    e.preventDefault();
    FREE_MOVE.keys[key]=true;
  }else if(key==='e'||key==='enter'||key===' '){
    e.preventDefault();
    interactWorld();
  }
}
function handleWorldKeyUp(e){
  const key=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(key)){
    FREE_MOVE.keys[key]=false;
    if(byId('tile-map'))saveState();
  }
}
async function init(){
  setMain('<div class="home"><div class="h-fire">🔥</div><div class="h-sub">Loading leaderboard...</div></div>');
  await loadPlayers();
  window.addEventListener('keydown',handleWorldKey);
  window.addEventListener('keyup',handleWorldKeyUp);
  if(!FREE_MOVE.raf)FREE_MOVE.raf=requestAnimationFrame(worldTick);
  window.addEventListener('resize',()=>{if(byId('tile-map'))updateWorldView();});
  showHome();
}
init();
</script>
</body>
</html>
